name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.22', '1.23']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -timeout 10m ./...

      - name: Build
        run: go build -o vettcode ./cmd/vettcode

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./vettcode version
          ./vettcode scan testdata/fixtures/healthy-saas --offline --format json -q -o /tmp/smoke.json
          test -f /tmp/smoke.json

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\vettcode.exe version
          .\vettcode.exe scan testdata\fixtures\healthy-saas --offline --format json -q -o $env:TEMP\smoke.json
          if (-not (Test-Path $env:TEMP\smoke.json)) { exit 1 }

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
